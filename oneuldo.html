<!DOCTYPE html>
<!--
  "오늘도" — Day 1 강사 데모 레퍼런스 (완성본 · 세련 버전)
  ──────────────────────────────────────────────────────────
  ▸ v2-day1 오버레이 PRD("오늘도") 구현. B1 막연한 결과(데모1)와 대비용.
  ▸ PRD Must 3종에만 집중 / 단일 습관:
       ① 오늘 체크 버튼   ② Streak 카운터   ③ 주간 달성률(진행 링)
  ▸ "집중 = 허전"이 아니라 "집중 = 세련"이 되도록 마이크로 인터랙션·진행 링 추가.
  ▸ 빌드 도구 없음(정적 HTML + localStorage). 실제로 동작하고 저장됨(데모1과 결정적 차이).
-->
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
<title>오늘도</title>
<style>
  :root {
    --bg: #f6f7fc;
    --card: #ffffff;
    --ink: #1b2030;
    --muted: #8a90a6;
    --line: #eceef6;
    --primary: #5b6ef5;
    --primary-2: #8b7bff;
    --done: #1fbf75;
    --done-2: #19a866;
    --fire: #ff8a3d;
    --shadow: 0 10px 30px rgba(40, 48, 90, 0.10);
    --shadow-sm: 0 4px 14px rgba(40, 48, 90, 0.07);
  }
  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  body {
    margin: 0; background: var(--bg); color: var(--ink);
    font-family: -apple-system, BlinkMacSystemFont, "Apple SD Gothic Neo", "Noto Sans KR", "Malgun Gothic", sans-serif;
    line-height: 1.5; -webkit-font-smoothing: antialiased;
  }
  .app { max-width: 460px; margin: 0 auto; min-height: 100vh; padding: 0 18px 40px; }

  header { text-align: center; padding: 30px 0 6px; }
  .brand {
    font-size: 1.7rem; font-weight: 800; letter-spacing: -0.6px;
    background: linear-gradient(120deg, var(--primary), var(--primary-2));
    -webkit-background-clip: text; background-clip: text; color: transparent;
  }
  .brand-sub { margin-top: 2px; font-size: 0.86rem; color: var(--muted); }

  /* 습관 칩 */
  .habit-chip {
    display: inline-flex; align-items: center; gap: 8px;
    margin: 16px auto 0; padding: 7px 8px 7px 14px;
    background: var(--card); border: 1px solid var(--line); border-radius: 999px;
    box-shadow: var(--shadow-sm); cursor: pointer;
    font-weight: 700; font-size: 1rem;
  }
  .habit-chip .emoji { font-size: 1.15rem; }
  .habit-chip .pen { font-size: 0.72rem; color: var(--muted); background: #f1f2f9; border-radius: 999px; padding: 4px 9px; font-weight: 600; }

  .center { text-align: center; }

  /* ① 오늘 체크 — 히어로 */
  .hero {
    position: relative; margin: 22px auto 0; width: 200px; height: 200px;
    display: flex; align-items: center; justify-content: center; cursor: pointer;
    user-select: none;
  }
  .hero .ring-bg, .hero .ring-fg { fill: none; stroke-width: 10; }
  .hero .ring-bg { stroke: var(--line); }
  .hero svg { position: absolute; inset: 0; transform: rotate(-90deg); }
  .hero .core {
    width: 150px; height: 150px; border-radius: 50%;
    background: var(--card); border: 1px solid var(--line);
    box-shadow: var(--shadow);
    display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 6px;
    transition: transform .15s ease, background .25s ease, box-shadow .25s ease;
  }
  .hero .mark { font-size: 3rem; line-height: 1; color: #cfd3e4; transition: color .2s ease, transform .2s ease; }
  .hero .hint { font-size: 0.82rem; font-weight: 700; color: var(--muted); }
  .hero:active .core { transform: scale(0.95); }
  /* 완료 상태 */
  .hero.done .core { background: linear-gradient(135deg, var(--done), var(--done-2)); border-color: transparent; box-shadow: 0 14px 30px rgba(31,191,117,0.35); }
  .hero.done .mark { color: #fff; }
  .hero.done .hint { color: rgba(255,255,255,0.95); }
  .hero.pop .core { animation: pop .4s ease; }
  @keyframes pop { 0%{transform:scale(1)} 35%{transform:scale(1.09)} 100%{transform:scale(1)} }

  /* 반짝임 */
  .spark { position: absolute; width: 8px; height: 8px; border-radius: 50%; background: var(--done); opacity: 0; pointer-events: none; }
  .hero.pop .spark { animation: spark .6s ease-out forwards; }
  @keyframes spark { 0%{opacity:1; transform: translate(0,0) scale(1)} 100%{opacity:0; transform: translate(var(--dx), var(--dy)) scale(0.3)} }

  /* ②③ 지표 두 칸 */
  .stats { display: flex; gap: 12px; margin-top: 26px; }
  .tile { flex: 1; background: var(--card); border: 1px solid var(--line); border-radius: 18px; padding: 16px 14px; box-shadow: var(--shadow-sm); text-align: center; }
  .tile .k { font-size: 0.74rem; color: var(--muted); font-weight: 600; margin-bottom: 8px; }
  .tile.streak .v { font-size: 2rem; font-weight: 800; color: var(--fire); line-height: 1; }
  .tile.streak .v small { font-size: 0.95rem; font-weight: 700; }
  .tile .flame { font-size: 1rem; }

  /* 주간 미니 링 */
  .miniring { position: relative; width: 64px; height: 64px; margin: 0 auto; }
  .miniring svg { transform: rotate(-90deg); }
  .miniring .bg { fill:none; stroke: var(--line); stroke-width: 8; }
  .miniring .fg { fill:none; stroke: var(--primary); stroke-width: 8; stroke-linecap: round; transition: stroke-dashoffset .5s ease; }
  .miniring .pct { position: absolute; inset: 0; display: flex; align-items: center; justify-content: center; font-size: 0.92rem; font-weight: 800; color: var(--primary); }

  /* 이번 주 7일 */
  .week { margin-top: 14px; background: var(--card); border: 1px solid var(--line); border-radius: 18px; padding: 16px; box-shadow: var(--shadow-sm); }
  .week-top { display: flex; align-items: center; justify-content: space-between; margin-bottom: 12px; }
  .week-top h3 { margin: 0; font-size: 0.86rem; color: var(--muted); font-weight: 700; }
  .week-top .frac { font-size: 0.78rem; color: var(--primary); font-weight: 700; }
  .week-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 6px; }
  .day { text-align: center; }
  .day .wd { font-size: 0.66rem; color: var(--muted); margin-bottom: 6px; }
  .day .dot {
    width: 32px; height: 32px; margin: 0 auto; border-radius: 11px;
    background: #f1f2f9; border: 1.5px solid var(--line);
    display: flex; align-items: center; justify-content: center; font-size: 0.82rem; color: transparent;
    transition: transform .12s ease;
  }
  .day.done .dot { background: linear-gradient(135deg, var(--done), var(--done-2)); border-color: transparent; color: #fff; }
  .day.today .dot { box-shadow: 0 0 0 2px rgba(91,110,245,0.4); }
  .day.future .wd, .day.future .dot { opacity: 0.4; }

  .encourage { margin-top: 16px; text-align: center; font-size: 0.85rem; color: var(--muted); line-height: 1.6; }
  .encourage b { color: var(--ink); }

  /* 편집 모달 */
  .modal-bg { display:none; position:fixed; inset:0; background:rgba(20,24,40,0.5); align-items:flex-end; justify-content:center; z-index:20; }
  .modal-bg.show { display:flex; }
  .modal { background:var(--card); width:100%; max-width:460px; border-radius:22px 22px 0 0; padding:22px 18px calc(22px + env(safe-area-inset-bottom)); animation: up .22s ease; }
  @keyframes up { from{transform:translateY(40px);opacity:.6} to{transform:translateY(0);opacity:1} }
  .modal h2 { margin:0 0 14px; font-size:1.1rem; }
  .modal label { display:block; font-size:0.8rem; font-weight:700; color:var(--muted); margin:10px 0 8px; }
  .modal input { width:100%; padding:12px 13px; border:1px solid var(--line); border-radius:12px; font-size:0.95rem; background:#fafbff; }
  .modal input:focus { outline:none; border-color:var(--primary); background:#fff; }
  .emoji-pick { display:flex; flex-wrap:wrap; gap:7px; }
  .emoji-pick button { width:42px; height:42px; font-size:1.15rem; border:1.5px solid var(--line); background:var(--card); border-radius:12px; cursor:pointer; }
  .emoji-pick button.on { border-color:var(--primary); background:#eef0ff; }
  .modal-actions { display:flex; gap:10px; margin-top:18px; }
  .modal-actions button { flex:1; padding:14px; border:none; border-radius:13px; font-weight:800; font-size:0.95rem; cursor:pointer; }
  .btn-primary { background:linear-gradient(120deg,var(--primary),var(--primary-2)); color:#fff; }
  .btn-ghost { background:#eef0f6; color:var(--muted); }
</style>
</head>
<body>
<div class="app">
  <header>
    <div class="brand">오늘도</div>
    <div class="brand-sub">오늘 하나만 체크하면 돼요</div>
  </header>

  <div class="center">
    <div class="habit-chip" id="editBtn">
      <span class="emoji" id="habitEmoji">🏃</span>
      <span id="habitName">운동</span>
      <span class="pen">✏️ 바꾸기</span>
    </div>
  </div>

  <!-- ① 오늘 체크 (히어로 + 진행 링) -->
  <div class="hero" id="hero">
    <svg viewBox="0 0 200 200" width="200" height="200">
      <circle class="ring-bg" cx="100" cy="100" r="92"></circle>
      <circle class="ring-fg" id="heroRing" cx="100" cy="100" r="92"
              stroke="url(#g1)" stroke-linecap="round"></circle>
      <defs>
        <linearGradient id="g1" x1="0" y1="0" x2="1" y2="1">
          <stop offset="0" stop-color="#1fbf75"/><stop offset="1" stop-color="#19a866"/>
        </linearGradient>
      </defs>
    </svg>
    <div class="core">
      <span class="mark" id="heroMark">✓</span>
      <span class="hint" id="heroHint">탭하기</span>
    </div>
  </div>

  <!-- ② Streak / ③ 주간율 링 -->
  <div class="stats">
    <div class="tile streak">
      <div class="k">🔥 연속 달성</div>
      <div class="v"><span id="streakNum">0</span><small>일</small></div>
    </div>
    <div class="tile">
      <div class="k">이번 주 달성률</div>
      <div class="miniring">
        <svg viewBox="0 0 64 64" width="64" height="64">
          <circle class="bg" cx="32" cy="32" r="26"></circle>
          <circle class="fg" id="weekRing" cx="32" cy="32" r="26"></circle>
        </svg>
        <div class="pct" id="rateNum">0%</div>
      </div>
    </div>
  </div>

  <!-- 이번 주 7일 -->
  <div class="week">
    <div class="week-top">
      <h3>이번 주</h3>
      <span class="frac" id="rateFrac">0 / 7</span>
    </div>
    <div class="week-grid" id="weekGrid"></div>
    <div class="encourage" id="encourage"></div>
  </div>
</div>

<!-- 편집 -->
<div class="modal-bg" id="modal">
  <div class="modal">
    <h2>습관 바꾸기</h2>
    <label>아이콘</label>
    <div class="emoji-pick" id="emojiPick"></div>
    <label for="nameInput">습관 이름</label>
    <input type="text" id="nameInput" maxlength="20" placeholder="예: 운동, 공부, 물 마시기" />
    <div class="modal-actions">
      <button class="btn-ghost" id="cancelBtn">취소</button>
      <button class="btn-primary" id="saveBtn">저장</button>
    </div>
  </div>
</div>

<script>
  const STORAGE_KEY = "oneuldo_v1";
  const EMOJIS = ["🏃","📖","💧","🧘","💪","🥗","😴","✍️","🦷","🚭"];
  const WDAY = ["일","월","화","수","목","금","토"];

  let state = load();
  let pickedEmoji = state.emoji;

  function load() {
    try { const s = JSON.parse(localStorage.getItem(STORAGE_KEY)); if (s && s.done) return s; } catch (e) {}
    return { name: "운동", emoji: "🏃", done: {} };
  }
  function save() { localStorage.setItem(STORAGE_KEY, JSON.stringify(state)); }
  function toKey(d){ return d.getFullYear()+"-"+String(d.getMonth()+1).padStart(2,"0")+"-"+String(d.getDate()).padStart(2,"0"); }
  const todayKey = toKey(new Date());

  function thisWeek(){
    const now = new Date(); const sun = new Date(now); sun.setDate(now.getDate()-now.getDay());
    const a = []; for (let i=0;i<7;i++){ const d = new Date(sun); d.setDate(sun.getDate()+i); a.push(d); } return a;
  }
  function streak(){
    let n=0; const d=new Date();
    if(!state.done[toKey(d)]) d.setDate(d.getDate()-1);
    while(state.done[toKey(d)]){ n++; d.setDate(d.getDate()-1); } return n;
  }

  const hero = document.getElementById("hero");
  const heroRing = document.getElementById("heroRing");
  const weekRing = document.getElementById("weekRing");
  const weekGrid = document.getElementById("weekGrid");
  const HERO_C = 2 * Math.PI * 92;   // 히어로 링 둘레
  const MINI_C = 2 * Math.PI * 26;   // 주간 미니 링 둘레
  heroRing.style.strokeDasharray = HERO_C;
  weekRing.style.strokeDasharray = MINI_C;

  function render(){
    document.getElementById("habitEmoji").textContent = state.emoji;
    document.getElementById("habitName").textContent = state.name;

    const doneToday = !!state.done[todayKey];
    hero.classList.toggle("done", doneToday);
    document.getElementById("heroMark").textContent = doneToday ? "✓" : "✓";
    document.getElementById("heroHint").textContent = doneToday ? "오늘 완료!" : "탭하기";
    // 히어로 링: 완료면 꽉, 아니면 빔
    heroRing.style.strokeDashoffset = HERO_C * (doneToday ? 0 : 1);

    document.getElementById("streakNum").textContent = streak();

    const days = thisWeek(); let done = 0;
    weekGrid.innerHTML = "";
    const now = new Date();
    days.forEach(d => {
      const key = toKey(d), isDone = !!state.done[key], isToday = key === todayKey;
      const isFuture = d > now && !isToday;
      if (isDone) done++;
      const el = document.createElement("div");
      el.className = "day" + (isDone?" done":"") + (isToday?" today":"") + (isFuture?" future":"");
      el.innerHTML = `<div class="wd">${WDAY[d.getDay()]}</div><div class="dot">✓</div>`;
      weekGrid.appendChild(el);
    });
    const pct = Math.round((done/7)*100);
    document.getElementById("rateNum").textContent = pct + "%";
    document.getElementById("rateFrac").textContent = done + " / 7";
    weekRing.style.strokeDashoffset = MINI_C * (1 - done/7);

    const enc = document.getElementById("encourage");
    if (done === 0) enc.innerHTML = "이번 주 첫 체크를 기다리고 있어요.<br><b>오늘 하나만</b> 눌러볼까요?";
    else if (done >= 5) enc.innerHTML = `이번 주 <b>${done}일</b> 달성! 완벽하지 않아도 충분히 잘하고 있어요. 💪`;
    else enc.innerHTML = `하루 빠져도 실패가 아니에요 —<br>이번 주로 보면 <b>여전히 성공 중</b>이에요.`;
  }

  function sparkle(){
    // 완료 순간 작은 반짝임 8개
    for (let i=0;i<8;i++){
      const s = document.createElement("span");
      s.className = "spark";
      const ang = (Math.PI*2) * (i/8);
      s.style.left = "50%"; s.style.top = "50%";
      s.style.setProperty("--dx", Math.cos(ang)*70 + "px");
      s.style.setProperty("--dy", Math.sin(ang)*70 + "px");
      hero.appendChild(s);
      setTimeout(() => s.remove(), 650);
    }
  }

  hero.addEventListener("click", () => {
    const willDone = !state.done[todayKey];
    if (willDone) state.done[todayKey] = true; else delete state.done[todayKey];
    save();
    render();
    if (willDone){
      hero.classList.remove("pop"); void hero.offsetWidth; hero.classList.add("pop");
      sparkle();
    }
  });

  // 편집
  const modal = document.getElementById("modal"), nameInput = document.getElementById("nameInput"), emojiPick = document.getElementById("emojiPick");
  EMOJIS.forEach(e => { const b=document.createElement("button"); b.textContent=e; b.dataset.e=e; b.onclick=()=>pick(e); emojiPick.appendChild(b); });
  function pick(e){ pickedEmoji=e; emojiPick.querySelectorAll("button").forEach(b=>b.classList.toggle("on", b.dataset.e===e)); }
  document.getElementById("editBtn").onclick = () => { pick(state.emoji); nameInput.value = state.name; modal.classList.add("show"); nameInput.focus(); };
  document.getElementById("cancelBtn").onclick = () => modal.classList.remove("show");
  modal.onclick = e => { if (e.target === modal) modal.classList.remove("show"); };
  document.getElementById("saveBtn").onclick = () => {
    const n = nameInput.value.trim(); if (!n){ nameInput.focus(); return; }
    state.name = n; state.emoji = pickedEmoji; save(); modal.classList.remove("show"); render();
  };

  render();
</script>
</body>
</html>
