<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>행사 신청</title>
  <style>
    body { font-family: sans-serif; max-width: 500px; margin: 60px auto; padding: 0 1rem; }
    h1 { font-size: 1.5rem; margin-bottom: 1.5rem; }
    label { display: block; margin-bottom: .25rem; font-size: .9rem; }
    input, textarea {
      width: 100%; padding: .5rem; margin-bottom: 1rem;
      border: 1px solid #ccc; border-radius: 4px; font-size: .95rem;
    }
    button {
      background: #2563eb; color: white; border: none;
      padding: .65rem 1.5rem; border-radius: 4px; cursor: pointer; font-size: 1rem;
    }
    button:hover { background: #1d4ed8; }
    .msg { margin-top: 1rem; color: green; display: none; }
  </style>
</head>
<body>
  <h1>행사 신청</h1>
  <form id="form">
    <label>이름</label>
    <input type="text" id="name" placeholder="이름을 입력하세요" required>
    <label>이메일</label>
    <input type="email" id="email" placeholder="이메일을 입력하세요" required>
    <label>연락처</label>
    <input type="tel" id="phone" placeholder="010-0000-0000">
    <label>참가 동기</label>
    <textarea id="reason" rows="3" placeholder="참가 이유를 작성해 주세요"></textarea>
    <button type="submit">신청하기</button>
  </form>
  <div class="msg" id="msg">✅ 신청이 완료되었습니다!</div>
  <script>
    document.getElementById('form').addEventListener('submit', function(e) {
      e.preventDefault();
      document.getElementById('msg').style.display = 'block';
      this.reset();
    });
  </script>
</body>
</html>
