<!DOCTYPE html>
<!--
  "오늘도" — Day 1 강사 데모 레퍼런스 (완성본)
  ──────────────────────────────────────────────────────────
  ▸ 이 앱은 v2-day1 오버레이의 PRD(앱 이름 "오늘도")를 그대로 구현한 결과물입니다.
  ▸ B1의 막연한 프롬프트("습관 트래커 앱 만들어줘") 결과와 대비해서 보여주세요.
  ▸ PRD Must 3종에만 집중 / "Won't: 멀티 습관"에 따라 단일 습관 설계.
       ① 오늘 체크 버튼   ② Streak 카운터   ③ 주간 달성률
  ▸ 빌드 도구 없음(정적 HTML + localStorage) — 더블클릭하면 바로 실행.
-->
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
<title>오늘도</title>
<style>
  :root {
    --bg: #f4f6fb;
    --card: #ffffff;
    --primary: #4f6ef7;
    --primary-dark: #3b55d9;
    --text: #1f2433;
    --muted: #717892;
    --border: #e4e8f2;
    --done: #27ae60;
    --done-dark: #1e9b52;
    --fire: #f2994a;
    --shadow: 0 6px 22px rgba(33, 43, 84, 0.10);
  }
  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  body {
    margin: 0;
    font-family: -apple-system, BlinkMacSystemFont, "Apple SD Gothic Neo",
      "Noto Sans KR", "Malgun Gothic", sans-serif;
    background: var(--bg); color: var(--text); line-height: 1.5;
    -webkit-font-smoothing: antialiased;
  }
  header {
    background: linear-gradient(135deg, var(--primary), #7a8cff);
    color: #fff; padding: 26px 18px 20px; text-align: center;
  }
  header .brand { font-size: 1.5rem; font-weight: 800; letter-spacing: -0.5px; }
  header .sub { margin-top: 4px; font-size: 0.84rem; opacity: 0.92; }

  .wrap { max-width: 520px; margin: 0 auto; padding: 18px 16px 40px; }

  /* 습관 이름 (단일 습관) */
  .habit-bar {
    display: flex; align-items: center; justify-content: center; gap: 8px;
    margin: 4px 0 18px; font-size: 1.1rem; font-weight: 700;
  }
  .habit-bar .emoji { font-size: 1.25rem; }
  .habit-bar .edit {
    border: none; background: #eef0f6; color: var(--muted);
    border-radius: 999px; padding: 4px 10px; font-size: 0.74rem; font-weight: 600; cursor: pointer;
  }

  /* ① 오늘 체크 버튼 — 화면의 주인공 (터치 한 번) */
  .check-btn {
    width: 100%; border: none; cursor: pointer;
    background: var(--card); border: 2px solid var(--border);
    border-radius: 22px; padding: 30px 20px; margin-bottom: 18px;
    box-shadow: var(--shadow);
    display: flex; flex-direction: column; align-items: center; gap: 10px;
    transition: transform 0.1s ease, background 0.15s ease;
  }
  .check-btn:active { transform: scale(0.97); }
  .check-btn .circle {
    width: 84px; height: 84px; border-radius: 50%;
    border: 3px solid var(--border);
    display: flex; align-items: center; justify-content: center;
    font-size: 2.4rem; color: var(--border);
    transition: all 0.18s ease;
  }
  .check-btn .label { font-size: 1.05rem; font-weight: 700; color: var(--muted); }
  /* 완료 상태 */
  .check-btn.done { background: var(--done); border-color: var(--done); }
  .check-btn.done .circle { border-color: #fff; color: #fff; }
  .check-btn.done .label { color: #fff; }

  /* ②③ 두 지표 카드 나란히 */
  .stats { display: flex; gap: 12px; margin-bottom: 18px; }
  .stat {
    flex: 1; background: var(--card); border: 1px solid var(--border);
    border-radius: 16px; padding: 16px 12px; text-align: center; box-shadow: var(--shadow);
  }
  .stat .big { font-size: 1.9rem; font-weight: 800; line-height: 1.1; }
  .stat.streak .big { color: var(--fire); }
  .stat.rate .big { color: var(--primary); }
  .stat .cap { margin-top: 4px; font-size: 0.76rem; color: var(--muted); }

  /* ③ 이번 주 7일 점 표시 */
  .week {
    background: var(--card); border: 1px solid var(--border);
    border-radius: 16px; padding: 16px; box-shadow: var(--shadow);
  }
  .week h3 { margin: 0 0 12px; font-size: 0.86rem; color: var(--muted); font-weight: 600; }
  .week-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 6px; }
  .day { text-align: center; }
  .day .wd { font-size: 0.68rem; color: var(--muted); margin-bottom: 5px; }
  .day .dot {
    width: 30px; height: 30px; margin: 0 auto; border-radius: 50%;
    background: #f0f2f8; border: 1.5px solid var(--border);
    display: flex; align-items: center; justify-content: center;
    font-size: 0.8rem; color: transparent;
  }
  .day.done .dot { background: var(--done); border-color: var(--done); color: #fff; }
  .day.today .dot { box-shadow: 0 0 0 2px rgba(79,110,247,0.4); }
  .day.future .wd, .day.future .dot { opacity: 0.4; }

  /* "하루 빠짐 ≠ 실패" 격려 메시지 (PRD 기대효과 반영) */
  .encourage {
    margin-top: 16px; text-align: center; font-size: 0.84rem;
    color: var(--muted); line-height: 1.55;
  }
  .encourage b { color: var(--text); }

  /* 이름 편집 모달 */
  .modal-bg { display: none; position: fixed; inset: 0; background: rgba(20,24,40,0.5); align-items: flex-end; justify-content: center; }
  .modal-bg.show { display: flex; }
  .modal { background: var(--card); width: 100%; max-width: 520px; border-radius: 18px 18px 0 0; padding: 20px 18px calc(20px + env(safe-area-inset-bottom)); }
  .modal h2 { margin: 0 0 14px; font-size: 1.1rem; }
  .modal label { display: block; font-size: 0.8rem; font-weight: 600; color: var(--muted); margin: 10px 0 6px; }
  .modal input { width: 100%; padding: 11px 12px; border: 1px solid var(--border); border-radius: 10px; font-size: 0.95rem; background: #fbfcff; }
  .modal input:focus { outline: none; border-color: var(--primary); background: #fff; }
  .emoji-pick { display: flex; flex-wrap: wrap; gap: 6px; }
  .emoji-pick button { width: 40px; height: 40px; font-size: 1.15rem; border: 1.5px solid var(--border); background: var(--card); border-radius: 10px; cursor: pointer; }
  .emoji-pick button.on { border-color: var(--primary); background: #eef1ff; }
  .modal-actions { display: flex; gap: 10px; margin-top: 16px; }
  .modal-actions button { flex: 1; padding: 13px; border: none; border-radius: 11px; font-weight: 700; font-size: 0.95rem; cursor: pointer; }
  .btn-primary { background: var(--primary); color: #fff; }
  .btn-ghost { background: #eef0f6; color: var(--muted); }
</style>
</head>
<body>
  <header>
    <div class="brand">오늘도</div>
    <div class="sub">오늘 하나만 체크하면 돼요</div>
  </header>

  <main class="wrap">
    <div class="habit-bar">
      <span class="emoji" id="habitEmoji">🏃</span>
      <span id="habitName">운동</span>
      <button class="edit" id="editBtn">✏️ 바꾸기</button>
    </div>

    <!-- ① 오늘 체크 버튼 -->
    <button class="check-btn" id="checkBtn">
      <span class="circle" id="checkCircle">✓</span>
      <span class="label" id="checkLabel">오늘 했어요?</span>
    </button>

    <!-- ② Streak / ③ 주간 달성률 -->
    <div class="stats">
      <div class="stat streak">
        <div class="big"><span id="streakNum">0</span><span style="font-size:1rem">일</span></div>
        <div class="cap">🔥 연속 달성</div>
      </div>
      <div class="stat rate">
        <div class="big" id="rateNum">0%</div>
        <div class="cap">이번 주 (<span id="rateFrac">0/7</span>)</div>
      </div>
    </div>

    <!-- ③ 이번 주 7일 -->
    <div class="week">
      <h3>이번 주</h3>
      <div class="week-grid" id="weekGrid"></div>
      <div class="encourage" id="encourage"></div>
    </div>
  </main>

  <!-- 습관 이름/이모지 편집 -->
  <div class="modal-bg" id="modal">
    <div class="modal">
      <h2>습관 바꾸기</h2>
      <label>아이콘</label>
      <div class="emoji-pick" id="emojiPick"></div>
      <label for="nameInput">습관 이름</label>
      <input type="text" id="nameInput" maxlength="20" placeholder="예: 운동, 공부, 물 마시기" />
      <div class="modal-actions">
        <button class="btn-ghost" id="cancelBtn">취소</button>
        <button class="btn-primary" id="saveBtn">저장</button>
      </div>
    </div>
  </div>

<script>
  /* ───────── 데이터 (단일 습관) ─────────
     state = { name, emoji, done: { "YYYY-MM-DD": true } } */
  const STORAGE_KEY = "oneuldo_v1";
  const EMOJIS = ["🏃","📖","💧","🧘","💪","🥗","😴","✍️","🦷","🚭"];
  const WDAY = ["일","월","화","수","목","금","토"];

  let state = load();
  let pickedEmoji = state.emoji;

  function load() {
    try {
      const s = JSON.parse(localStorage.getItem(STORAGE_KEY));
      if (s && s.done) return s;
    } catch (e) {}
    return { name: "운동", emoji: "🏃", done: {} }; // 첫 실행 기본값
  }
  function save() { localStorage.setItem(STORAGE_KEY, JSON.stringify(state)); }

  function toKey(d) {
    return d.getFullYear() + "-" +
      String(d.getMonth() + 1).padStart(2, "0") + "-" +
      String(d.getDate()).padStart(2, "0");
  }
  const todayKey = toKey(new Date());

  // 이번 주(일~토) 7일의 Date 배열
  function thisWeek() {
    const now = new Date();
    const sunday = new Date(now);
    sunday.setDate(now.getDate() - now.getDay()); // 이번 주 일요일로 이동
    const days = [];
    for (let i = 0; i < 7; i++) {
      const d = new Date(sunday);
      d.setDate(sunday.getDate() + i);
      days.push(d);
    }
    return days;
  }

  // ② Streak: 오늘(미체크면 어제)부터 거꾸로 연속 체크 일수
  function streak() {
    let n = 0;
    const d = new Date();
    if (!state.done[toKey(d)]) d.setDate(d.getDate() - 1);
    while (state.done[toKey(d)]) { n++; d.setDate(d.getDate() - 1); }
    return n;
  }

  // ─── 화면 그리기 ───
  const checkBtn = document.getElementById("checkBtn");
  const weekGrid = document.getElementById("weekGrid");

  function render() {
    // 습관 이름/아이콘
    document.getElementById("habitEmoji").textContent = state.emoji;
    document.getElementById("habitName").textContent = state.name;

    // ① 오늘 체크 상태
    const doneToday = !!state.done[todayKey];
    checkBtn.classList.toggle("done", doneToday);
    document.getElementById("checkCircle").textContent = doneToday ? "✓" : "";
    document.getElementById("checkLabel").textContent = doneToday ? "오늘 완료! 잘했어요 🎉" : "오늘 했어요?";

    // ② Streak
    document.getElementById("streakNum").textContent = streak();

    // ③ 주간 달성률 + 7일 점
    const days = thisWeek();
    let doneCount = 0;
    weekGrid.innerHTML = "";
    days.forEach(d => {
      const key = toKey(d);
      const isDone = !!state.done[key];
      const isToday = key === todayKey;
      const isFuture = d > new Date() && !isToday;
      if (isDone) doneCount++;
      const el = document.createElement("div");
      el.className = "day" + (isDone ? " done" : "") + (isToday ? " today" : "") + (isFuture ? " future" : "");
      el.innerHTML = `<div class="wd">${WDAY[d.getDay()]}</div><div class="dot">✓</div>`;
      weekGrid.appendChild(el);
    });
    const pct = Math.round((doneCount / 7) * 100);
    document.getElementById("rateNum").textContent = pct + "%";
    document.getElementById("rateFrac").textContent = doneCount + "/7";

    // "하루 빠짐 ≠ 실패" 메시지 (PRD 기대효과)
    const enc = document.getElementById("encourage");
    if (doneCount === 0) {
      enc.innerHTML = "이번 주 첫 체크를 기다리고 있어요.<br><b>오늘 하나만</b> 눌러볼까요?";
    } else if (doneCount >= 5) {
      enc.innerHTML = `이번 주 <b>${doneCount}일</b> 달성! 완벽하지 않아도 충분히 잘하고 있어요. 💪`;
    } else {
      enc.innerHTML = `이번 주 <b>${doneCount}/7</b>. 하루 빠져도 실패가 아니에요 —<br>이번 주 달성률로 보면 <b>여전히 성공 중</b>이에요.`;
    }
  }

  // ① 체크 버튼 토글
  checkBtn.addEventListener("click", () => {
    if (state.done[todayKey]) delete state.done[todayKey];
    else state.done[todayKey] = true;
    save();
    render();
  });

  // ─── 이름/아이콘 편집 모달 ───
  const modal = document.getElementById("modal");
  const nameInput = document.getElementById("nameInput");
  const emojiPick = document.getElementById("emojiPick");

  EMOJIS.forEach(e => {
    const b = document.createElement("button");
    b.textContent = e; b.dataset.e = e;
    b.addEventListener("click", () => pickEmoji(e));
    emojiPick.appendChild(b);
  });
  function pickEmoji(e) {
    pickedEmoji = e;
    emojiPick.querySelectorAll("button").forEach(b => b.classList.toggle("on", b.dataset.e === e));
  }

  document.getElementById("editBtn").addEventListener("click", () => {
    pickedEmoji = state.emoji;
    pickEmoji(state.emoji);
    nameInput.value = state.name;
    modal.classList.add("show");
    nameInput.focus();
  });
  document.getElementById("cancelBtn").addEventListener("click", () => modal.classList.remove("show"));
  modal.addEventListener("click", e => { if (e.target === modal) modal.classList.remove("show"); });
  document.getElementById("saveBtn").addEventListener("click", () => {
    const name = nameInput.value.trim();
    if (!name) { nameInput.focus(); return; }
    state.name = name;
    state.emoji = pickedEmoji;
    save();
    modal.classList.remove("show");
    render();
  });

  render();
</script>
</body>
</html>
