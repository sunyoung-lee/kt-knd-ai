<!DOCTYPE html>
<!--
  데모 1 — "막연한 프롬프트" 결과물 (B1 시연용)
  ──────────────────────────────────────────────────────────
  프롬프트: "습관 트래커 앱 만들어줘"  (사용자·문제·우선순위 없음)
  → 결과: 그럴듯하지만 초점이 없는 범용 앱.
    여러 습관 + 알림 + 카테고리 + 통계 + 캘린더 + 목표가 한꺼번에.
    "뭔가 많이 나왔는데, 내가 원하는 걸 푸는지 모르겠다" 를 보여주기 위한 데모.
  ※ 일부러 기능을 과하게 늘리고 초점을 흐린 버전입니다. (안티패턴 예시)
-->
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>습관 트래커 (데모 1)</title>
<style>
  * { box-sizing: border-box; }
  body { margin:0; font-family:-apple-system,BlinkMacSystemFont,"Noto Sans KR","Malgun Gothic",sans-serif; background:#eceff4; color:#2b2f3a; }
  header { background:#5b6b8c; color:#fff; padding:16px; text-align:center; }
  header h1 { margin:0; font-size:1.2rem; }
  header p { margin:4px 0 0; font-size:0.72rem; opacity:0.85; }
  .tabs { display:flex; background:#fff; border-bottom:1px solid #dde1ea; position:sticky; top:0; }
  .tabs button { flex:1; padding:11px 4px; border:none; background:none; font-size:0.82rem; color:#7b8194; cursor:pointer; border-bottom:2px solid transparent; }
  .tabs button.on { color:#5b6b8c; font-weight:700; border-bottom-color:#5b6b8c; }
  .panel { display:none; padding:14px; }
  .panel.on { display:block; }

  /* 카테고리 필터 (장식적, 깊이 없음) */
  .cats { display:flex; gap:6px; flex-wrap:wrap; margin-bottom:12px; }
  .cats span { font-size:0.72rem; padding:5px 10px; border-radius:999px; background:#fff; border:1px solid #dde1ea; color:#7b8194; }
  .cats span.on { background:#5b6b8c; color:#fff; border-color:#5b6b8c; }

  .habit { background:#fff; border:1px solid #e2e6ef; border-radius:10px; padding:11px 13px; margin-bottom:8px; display:flex; align-items:center; gap:10px; }
  .habit .cb { width:26px; height:26px; border-radius:7px; border:2px solid #c7cdda; flex-shrink:0; cursor:pointer; display:flex; align-items:center; justify-content:center; color:transparent; font-size:0.9rem; }
  .habit.done .cb { background:#5b6b8c; border-color:#5b6b8c; color:#fff; }
  .habit .nm { flex:1; font-size:0.92rem; }
  .habit .cat { font-size:0.66rem; color:#9aa0b0; background:#f2f4f8; padding:2px 7px; border-radius:6px; }
  .add { width:100%; padding:11px; border:1px dashed #b9c0d0; background:#fff; border-radius:10px; color:#7b8194; font-size:0.86rem; cursor:pointer; margin-top:4px; }

  .row { display:flex; align-items:center; justify-content:space-between; background:#fff; border:1px solid #e2e6ef; border-radius:10px; padding:12px 13px; margin-bottom:8px; font-size:0.88rem; }
  .toggle { width:42px; height:24px; border-radius:999px; background:#d4d9e4; position:relative; cursor:pointer; flex-shrink:0; }
  .toggle.on { background:#5b6b8c; }
  .toggle::after { content:""; position:absolute; top:2px; left:2px; width:20px; height:20px; border-radius:50%; background:#fff; transition:left 0.15s; }
  .toggle.on::after { left:20px; }

  /* 통계: 얕은 막대 */
  .bars { display:flex; align-items:flex-end; gap:8px; height:120px; padding:10px; background:#fff; border:1px solid #e2e6ef; border-radius:10px; }
  .bars .bar { flex:1; background:#9aa8c4; border-radius:5px 5px 0 0; }
  .barwrap { text-align:center; flex:1; }
  .barwrap small { font-size:0.66rem; color:#9aa0b0; }
  .statline { display:flex; gap:8px; margin-top:10px; }
  .statline .b { flex:1; background:#fff; border:1px solid #e2e6ef; border-radius:10px; padding:12px; text-align:center; }
  .statline .b b { display:block; font-size:1.3rem; color:#5b6b8c; }
  .statline .b small { font-size:0.66rem; color:#9aa0b0; }

  /* 캘린더: 형식만 */
  .cal { display:grid; grid-template-columns:repeat(7,1fr); gap:4px; }
  .cal div { aspect-ratio:1; border-radius:6px; background:#fff; border:1px solid #e8ebf2; display:flex; align-items:center; justify-content:center; font-size:0.7rem; color:#9aa0b0; }
  .cal div.f { background:#aeb9d2; color:#fff; }

  .note { font-size:0.7rem; color:#9aa0b0; margin-top:12px; text-align:center; }
</style>
</head>
<body>
  <header>
    <h1>습관 트래커</h1>
    <p>나의 모든 습관을 한 곳에서 관리하세요</p>
  </header>

  <div class="tabs">
    <button class="on" data-t="today">오늘</button>
    <button data-t="stats">통계</button>
    <button data-t="cal">캘린더</button>
    <button data-t="set">설정</button>
  </div>

  <!-- 오늘: 여러 습관 + 카테고리 -->
  <div class="panel on" id="today">
    <div class="cats">
      <span class="on">전체</span><span>건강</span><span>공부</span><span>생활</span><span>마음</span>
    </div>
    <div class="habit"><div class="cb">✓</div><div class="nm">운동하기</div><div class="cat">건강</div></div>
    <div class="habit"><div class="cb">✓</div><div class="nm">물 2L 마시기</div><div class="cat">건강</div></div>
    <div class="habit"><div class="cb">✓</div><div class="nm">독서 30분</div><div class="cat">공부</div></div>
    <div class="habit"><div class="cb">✓</div><div class="nm">영어 단어 암기</div><div class="cat">공부</div></div>
    <div class="habit"><div class="cb">✓</div><div class="nm">명상</div><div class="cat">마음</div></div>
    <div class="habit"><div class="cb">✓</div><div class="nm">비타민 챙기기</div><div class="cat">생활</div></div>
    <div class="habit"><div class="cb">✓</div><div class="nm">일기 쓰기</div><div class="cat">마음</div></div>
    <button class="add">＋ 습관 추가</button>
  </div>

  <!-- 통계 -->
  <div class="panel" id="stats">
    <div class="bars">
      <div class="barwrap"><div class="bar" style="height:60%"></div><small>월</small></div>
      <div class="barwrap"><div class="bar" style="height:85%"></div><small>화</small></div>
      <div class="barwrap"><div class="bar" style="height:40%"></div><small>수</small></div>
      <div class="barwrap"><div class="bar" style="height:70%"></div><small>목</small></div>
      <div class="barwrap"><div class="bar" style="height:55%"></div><small>금</small></div>
      <div class="barwrap"><div class="bar" style="height:90%"></div><small>토</small></div>
      <div class="barwrap"><div class="bar" style="height:30%"></div><small>일</small></div>
    </div>
    <div class="statline">
      <div class="b"><b>62%</b><small>전체 달성률</small></div>
      <div class="b"><b>7</b><small>관리 중 습관</small></div>
      <div class="b"><b>12</b><small>최장 연속</small></div>
    </div>
  </div>

  <!-- 캘린더 -->
  <div class="panel" id="cal">
    <div class="cal" id="calGrid"></div>
    <p class="note">날짜를 누르면 그 날의 습관 기록을 볼 수 있어요 (예시)</p>
  </div>

  <!-- 설정: 토글 잔뜩 -->
  <div class="panel" id="set">
    <div class="row"><span>알림 받기</span><div class="toggle on"></div></div>
    <div class="row"><span>매일 아침 리마인더 (08:00)</span><div class="toggle on"></div></div>
    <div class="row"><span>저녁 점검 알림 (21:00)</span><div class="toggle"></div></div>
    <div class="row"><span>주간 리포트 이메일</span><div class="toggle"></div></div>
    <div class="row"><span>다크 모드</span><div class="toggle"></div></div>
    <div class="row"><span>위젯 표시</span><div class="toggle on"></div></div>
    <div class="row"><span>데이터 클라우드 백업</span><div class="toggle"></div></div>
    <p class="note">설정이 많네요… 무엇부터 켜야 할까요?</p>
  </div>

<script>
  // 탭 전환
  document.querySelectorAll(".tabs button").forEach(b => {
    b.addEventListener("click", () => {
      document.querySelectorAll(".tabs button").forEach(x => x.classList.remove("on"));
      document.querySelectorAll(".panel").forEach(x => x.classList.remove("on"));
      b.classList.add("on");
      document.getElementById(b.dataset.t).classList.add("on");
    });
  });
  // 체크 토글 (얕음 - 저장 안 됨)
  document.querySelectorAll(".habit").forEach(h => {
    h.querySelector(".cb").addEventListener("click", () => h.classList.toggle("done"));
  });
  // 카테고리 토글 (장식)
  document.querySelectorAll(".cats span").forEach(s => {
    s.addEventListener("click", () => {
      document.querySelectorAll(".cats span").forEach(x => x.classList.remove("on"));
      s.classList.add("on");
    });
  });
  // 설정 토글
  document.querySelectorAll(".toggle").forEach(t => t.addEventListener("click", () => t.classList.toggle("on")));
  // 캘린더 채우기 (형식만)
  const cal = document.getElementById("calGrid");
  const filled = {2:1,3:1,5:1,8:1,9:1,12:1,15:1,16:1,17:1,20:1,23:1,25:1,26:1};
  for (let i = 1; i <= 28; i++) {
    const d = document.createElement("div");
    if (filled[i]) d.className = "f";
    d.textContent = i;
    cal.appendChild(d);
  }
</script>
</body>
</html>
