<!DOCTYPE html>
<!--
  습관 트래커 — 학습용 프로토타입
  ────────────────────────────────────────────────
  이 파일은 "구조(HTML)"만 담당합니다.
  · 디자인(보이는 모양)은  style.css
  · 동작(기능/로직)은      app.js
  이렇게 역할을 나누는 것을 "관심사의 분리(Separation of Concerns)"라고 합니다.
-->
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <!-- 모바일에서 화면 폭에 맞춰 보이도록 하는 필수 설정 -->
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>습관 트래커 (학습용)</title>

  <!-- 외부 CSS 파일 연결 -->
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <!-- 1) 상단 머리말 -->
  <header class="app-header">
    <h1>✅ 습관 트래커</h1>
    <p>매일 체크하고 연속 달성(스트릭)을 쌓아보세요</p>
  </header>

  <main class="wrap">

    <!-- 2) 오늘 요약 배너 : 자바스크립트가 내용을 채웁니다 -->
    <section class="today-banner">
      <span id="today-date">—</span>
      <span id="today-rate" class="rate">—</span>
    </section>

    <!-- 3) 요일/날짜 헤더 : 자바스크립트가 최근 7일을 채웁니다 -->
    <div class="week-head" id="week-head">
      <div class="spacer">최근 7일</div>
    </div>

    <!-- 4) 습관 목록이 들어갈 빈 영역 : 자바스크립트가 카드들을 그려 넣습니다 -->
    <section id="habit-list"></section>

  </main>

  <!-- 5) 습관 추가 버튼 (화면 오른쪽 아래 고정) -->
  <button id="add-btn" class="fab" aria-label="습관 추가">+</button>

  <!-- 6) 습관 추가/수정 입력창 (평소엔 숨겨져 있음) -->
  <div id="modal" class="modal-bg">
    <div class="modal">
      <h2 id="modal-title">습관 추가</h2>

      <!-- 수정할 때 어떤 습관인지 기억해두는 숨은 값 -->
      <input type="hidden" id="edit-id" />

      <label class="field-label">아이콘</label>
      <div class="emoji-pick" id="emoji-pick"><!-- JS가 이모지 버튼을 채웁니다 --></div>

      <label class="field-label" for="habit-name">습관 이름</label>
      <input type="text" id="habit-name" placeholder="예: 물 2L 마시기" />

      <div class="modal-actions">
        <button id="cancel-btn" class="btn btn-ghost">취소</button>
        <button id="save-btn" class="btn btn-primary">저장</button>
      </div>
    </div>
  </div>

  <!-- 외부 JS 파일 연결 : </body> 바로 앞에 두어 HTML이 먼저 그려진 뒤 실행되게 합니다 -->
  <script src="app.js"></script>
</body>
</html>
