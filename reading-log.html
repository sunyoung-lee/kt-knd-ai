<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
<title>독서 기록</title>
<style>
  :root {
    --bg: #f4f6fb;
    --card: #ffffff;
    --primary: #4f6ef7;
    --primary-dark: #3b55d9;
    --text: #1f2433;
    --muted: #717892;
    --border: #e4e8f2;
    --want: #f2994a;
    --reading: #2f80ed;
    --done: #27ae60;
    --star: #f2c94c;
    --danger: #eb5757;
    --shadow: 0 4px 16px rgba(33, 43, 84, 0.08);
  }

  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

  body {
    margin: 0;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Apple SD Gothic Neo",
      "Noto Sans KR", "Malgun Gothic", sans-serif;
    background: var(--bg);
    color: var(--text);
    line-height: 1.55;
    -webkit-font-smoothing: antialiased;
  }

  header {
    background: linear-gradient(135deg, var(--primary), #7a8cff);
    color: #fff;
    padding: 26px 18px 20px;
    text-align: center;
  }
  header h1 { margin: 0 0 6px; font-size: 1.5rem; }
  header p { margin: 0; opacity: 0.92; font-size: 0.88rem; }

  .wrap { max-width: 680px; margin: 0 auto; padding: 16px 14px 96px; }

  .stats {
    display: flex;
    gap: 8px;
    margin-bottom: 16px;
  }
  .stat {
    flex: 1;
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 12px 8px;
    text-align: center;
    box-shadow: var(--shadow);
  }
  .stat b { display: block; font-size: 1.25rem; color: var(--primary); }
  .stat span { font-size: 0.74rem; color: var(--muted); }

  .filters { display: flex; flex-wrap: wrap; gap: 8px; margin-bottom: 16px; }
  .filter-btn {
    flex: 1 1 auto;
    min-width: 64px;
    padding: 9px 10px;
    border: 1px solid var(--border);
    background: var(--card);
    border-radius: 999px;
    font-size: 0.88rem;
    font-weight: 600;
    color: var(--muted);
    cursor: pointer;
    transition: all 0.15s ease;
  }
  .filter-btn.active { background: var(--primary); border-color: var(--primary); color: #fff; }

  .book {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 14px;
    margin-bottom: 12px;
    box-shadow: var(--shadow);
    overflow: hidden;
  }
  .book-main { padding: 14px 16px; }
  .book-top { display: flex; align-items: flex-start; gap: 10px; }
  .book-info { flex: 1; min-width: 0; }
  .book-title { font-size: 1.02rem; font-weight: 600; word-break: break-word; }
  .book-author { font-size: 0.84rem; color: var(--muted); margin-top: 2px; }

  .status-tag {
    flex-shrink: 0;
    font-size: 0.72rem;
    font-weight: 700;
    color: #fff;
    padding: 3px 9px;
    border-radius: 999px;
    margin-top: 2px;
  }
  .status-tag.want { background: var(--want); }
  .status-tag.reading { background: var(--reading); }
  .status-tag.done { background: var(--done); }

  .book-rating { margin-top: 8px; color: var(--star); font-size: 0.95rem; letter-spacing: 1px; }
  .book-rating .empty-star { color: #dfe3ee; }
  .book-note {
    margin-top: 8px;
    font-size: 0.88rem;
    color: #4a5066;
    white-space: pre-wrap;
    word-break: break-word;
    background: #fafbff;
    border-radius: 8px;
    padding: 8px 10px;
  }
  .book-date { margin-top: 8px; font-size: 0.74rem; color: var(--muted); }

  .book-actions {
    display: flex;
    gap: 6px;
    border-top: 1px solid var(--border);
    background: #fbfcff;
  }
  .book-actions button {
    flex: 1;
    padding: 10px;
    border: none;
    background: transparent;
    font-size: 0.84rem;
    font-weight: 600;
    color: var(--muted);
    cursor: pointer;
  }
  .book-actions button.del { color: var(--danger); }
  .book-actions button:active { background: #eef0f6; }
  .book-actions button + button { border-left: 1px solid var(--border); }

  .empty { text-align: center; color: var(--muted); padding: 48px 16px; font-size: 0.92rem; }

  /* 추가 버튼 (플로팅) */
  .fab {
    position: fixed;
    right: max(16px, calc(50% - 340px + 16px));
    bottom: 20px;
    width: 56px; height: 56px;
    border-radius: 50%;
    background: var(--primary);
    color: #fff;
    border: none;
    font-size: 1.8rem;
    line-height: 1;
    box-shadow: 0 6px 20px rgba(79, 110, 247, 0.45);
    cursor: pointer;
    z-index: 20;
  }
  .fab:active { background: var(--primary-dark); }

  /* 모달 */
  .modal-bg {
    display: none;
    position: fixed; inset: 0;
    background: rgba(20, 24, 40, 0.5);
    z-index: 30;
    align-items: flex-end;
    justify-content: center;
  }
  .modal-bg.show { display: flex; }
  .modal {
    background: var(--card);
    width: 100%;
    max-width: 680px;
    border-radius: 18px 18px 0 0;
    padding: 20px 18px calc(20px + env(safe-area-inset-bottom));
    max-height: 92vh;
    overflow-y: auto;
    animation: slideUp 0.22s ease;
  }
  @keyframes slideUp { from { transform: translateY(40px); opacity: 0.6; } to { transform: translateY(0); opacity: 1; } }
  .modal h2 { margin: 0 0 14px; font-size: 1.15rem; }

  .field { margin-bottom: 14px; }
  .field label { display: block; font-size: 0.82rem; font-weight: 600; color: var(--muted); margin-bottom: 6px; }
  .field input, .field textarea, .field select {
    width: 100%;
    padding: 11px 12px;
    border: 1px solid var(--border);
    border-radius: 10px;
    font-family: inherit;
    font-size: 0.95rem;
    background: #fbfcff;
    color: var(--text);
  }
  .field textarea { min-height: 80px; resize: vertical; }
  .field input:focus, .field textarea:focus, .field select:focus { outline: none; border-color: var(--primary); background: #fff; }

  .seg { display: flex; gap: 6px; }
  .seg button {
    flex: 1;
    padding: 10px 4px;
    border: 1px solid var(--border);
    background: var(--card);
    border-radius: 10px;
    font-size: 0.85rem;
    font-weight: 600;
    color: var(--muted);
    cursor: pointer;
  }
  .seg button.on { background: var(--primary); border-color: var(--primary); color: #fff; }

  .stars-input { font-size: 1.7rem; letter-spacing: 4px; color: #dfe3ee; cursor: pointer; user-select: none; }
  .stars-input .on { color: var(--star); }

  .modal-actions { display: flex; gap: 10px; margin-top: 8px; }
  .modal-actions button {
    flex: 1;
    padding: 13px;
    border: none;
    border-radius: 11px;
    font-size: 0.95rem;
    font-weight: 700;
    cursor: pointer;
  }
  .btn-primary { background: var(--primary); color: #fff; }
  .btn-primary:active { background: var(--primary-dark); }
  .btn-ghost { background: #eef0f6; color: var(--muted); }
</style>
</head>
<body>
  <header>
    <h1>📚 독서 기록</h1>
    <p>읽은 책과 읽을 책을 기록하고 별점을 남겨보세요</p>
  </header>

  <div class="wrap">
    <div class="stats" id="stats"></div>

    <div class="filters" id="filters">
      <button class="filter-btn active" data-f="all">전체</button>
      <button class="filter-btn" data-f="want">읽고 싶음</button>
      <button class="filter-btn" data-f="reading">읽는 중</button>
      <button class="filter-btn" data-f="done">완독</button>
    </div>

    <div id="list"></div>
  </div>

  <button class="fab" id="fab" aria-label="책 추가">+</button>

  <!-- 추가/수정 모달 -->
  <div class="modal-bg" id="modalBg">
    <div class="modal">
      <h2 id="modalTitle">책 추가</h2>
      <input type="hidden" id="editId" />
      <div class="field">
        <label>제목 *</label>
        <input type="text" id="fTitle" placeholder="책 제목" />
      </div>
      <div class="field">
        <label>저자</label>
        <input type="text" id="fAuthor" placeholder="지은이" />
      </div>
      <div class="field">
        <label>상태</label>
        <div class="seg" id="fStatus">
          <button type="button" data-s="want">읽고 싶음</button>
          <button type="button" data-s="reading">읽는 중</button>
          <button type="button" data-s="done">완독</button>
        </div>
      </div>
      <div class="field">
        <label>별점</label>
        <div class="stars-input" id="fStars" data-val="0">
          <span data-v="1">★</span><span data-v="2">★</span><span data-v="3">★</span><span data-v="4">★</span><span data-v="5">★</span>
        </div>
      </div>
      <div class="field">
        <label>메모 / 감상</label>
        <textarea id="fNote" placeholder="기억에 남는 구절이나 한 줄 감상"></textarea>
      </div>
      <div class="modal-actions">
        <button class="btn-ghost" id="cancelBtn" type="button">취소</button>
        <button class="btn-primary" id="saveBtn" type="button">저장</button>
      </div>
    </div>
  </div>

<script>
  const STORAGE_KEY = "reading_log_v1";
  const STATUS = {
    want:    { label: "읽고 싶음", cls: "want" },
    reading: { label: "읽는 중",   cls: "reading" },
    done:    { label: "완독",      cls: "done" }
  };

  let books = load();
  let currentFilter = "all";
  let formStatus = "want";
  let formStars = 0;

  function load() {
    try { return JSON.parse(localStorage.getItem(STORAGE_KEY)) || []; }
    catch (e) { return []; }
  }
  function save() { localStorage.setItem(STORAGE_KEY, JSON.stringify(books)); }
  function uid() { return Date.now().toString(36) + Math.random().toString(36).slice(2, 7); }
  function esc(s) { return (s || "").replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;"); }

  const listEl = document.getElementById("list");
  const statsEl = document.getElementById("stats");

  function renderStats() {
    const total = books.length;
    const reading = books.filter(b => b.status === "reading").length;
    const done = books.filter(b => b.status === "done").length;
    statsEl.innerHTML = `
      <div class="stat"><b>${total}</b><span>전체</span></div>
      <div class="stat"><b>${reading}</b><span>읽는 중</span></div>
      <div class="stat"><b>${done}</b><span>완독</span></div>
    `;
  }

  function starHTML(n) {
    let h = "";
    for (let i = 1; i <= 5; i++) h += `<span class="${i <= n ? "" : "empty-star"}">★</span>`;
    return h;
  }

  function render() {
    renderStats();
    const items = books.filter(b => currentFilter === "all" || b.status === currentFilter);
    if (items.length === 0) {
      listEl.innerHTML = `<div class="empty">${total0()}</div>`;
      return;
    }
    listEl.innerHTML = "";
    items.forEach(b => {
      const st = STATUS[b.status];
      const card = document.createElement("div");
      card.className = "book";
      card.innerHTML = `
        <div class="book-main">
          <div class="book-top">
            <div class="book-info">
              <div class="book-title">${esc(b.title)}</div>
              ${b.author ? `<div class="book-author">${esc(b.author)}</div>` : ""}
            </div>
            <span class="status-tag ${st.cls}">${st.label}</span>
          </div>
          ${b.stars ? `<div class="book-rating">${starHTML(b.stars)}</div>` : ""}
          ${b.note ? `<div class="book-note">${esc(b.note)}</div>` : ""}
          <div class="book-date">기록: ${b.date || ""}</div>
        </div>
        <div class="book-actions">
          <button class="edit">수정</button>
          <button class="del">삭제</button>
        </div>
      `;
      card.querySelector(".edit").addEventListener("click", () => openModal(b.id));
      card.querySelector(".del").addEventListener("click", () => {
        if (confirm(`"${b.title}"을(를) 삭제할까요?`)) {
          books = books.filter(x => x.id !== b.id);
          save(); render();
        }
      });
      listEl.appendChild(card);
    });
  }

  function total0() {
    return currentFilter === "all"
      ? "아직 기록한 책이 없어요.<br>오른쪽 아래 + 버튼으로 추가해 보세요!"
      : "이 상태의 책이 없습니다.";
  }

  // ---- 필터 ----
  document.getElementById("filters").addEventListener("click", e => {
    const btn = e.target.closest(".filter-btn");
    if (!btn) return;
    document.querySelectorAll(".filter-btn").forEach(b => b.classList.remove("active"));
    btn.classList.add("active");
    currentFilter = btn.dataset.f;
    render();
  });

  // ---- 모달 ----
  const modalBg = document.getElementById("modalBg");
  const fTitle = document.getElementById("fTitle");
  const fAuthor = document.getElementById("fAuthor");
  const fNote = document.getElementById("fNote");
  const fStatusEl = document.getElementById("fStatus");
  const fStarsEl = document.getElementById("fStars");
  const editIdEl = document.getElementById("editId");

  function setFormStatus(s) {
    formStatus = s;
    fStatusEl.querySelectorAll("button").forEach(b => b.classList.toggle("on", b.dataset.s === s));
  }
  function setFormStars(n) {
    formStars = n;
    fStarsEl.dataset.val = n;
    fStarsEl.querySelectorAll("span").forEach(sp => sp.classList.toggle("on", +sp.dataset.v <= n));
  }

  fStatusEl.addEventListener("click", e => {
    const b = e.target.closest("button");
    if (b) setFormStatus(b.dataset.s);
  });
  fStarsEl.addEventListener("click", e => {
    const sp = e.target.closest("span");
    if (!sp) return;
    const v = +sp.dataset.v;
    setFormStars(v === formStars ? 0 : v); // 같은 별 다시 누르면 해제
  });

  function openModal(id) {
    if (id) {
      const b = books.find(x => x.id === id);
      if (!b) return;
      document.getElementById("modalTitle").textContent = "책 수정";
      editIdEl.value = id;
      fTitle.value = b.title;
      fAuthor.value = b.author || "";
      fNote.value = b.note || "";
      setFormStatus(b.status);
      setFormStars(b.stars || 0);
    } else {
      document.getElementById("modalTitle").textContent = "책 추가";
      editIdEl.value = "";
      fTitle.value = ""; fAuthor.value = ""; fNote.value = "";
      setFormStatus("want");
      setFormStars(0);
    }
    modalBg.classList.add("show");
    setTimeout(() => fTitle.focus(), 100);
  }
  function closeModal() { modalBg.classList.remove("show"); }

  document.getElementById("fab").addEventListener("click", () => openModal());
  document.getElementById("cancelBtn").addEventListener("click", closeModal);
  modalBg.addEventListener("click", e => { if (e.target === modalBg) closeModal(); });

  document.getElementById("saveBtn").addEventListener("click", () => {
    const title = fTitle.value.trim();
    if (!title) { fTitle.focus(); fTitle.style.borderColor = "var(--danger)"; return; }
    const id = editIdEl.value;
    const today = new Date().toISOString().slice(0, 10);
    if (id) {
      const b = books.find(x => x.id === id);
      Object.assign(b, { title, author: fAuthor.value.trim(), note: fNote.value.trim(), status: formStatus, stars: formStars });
    } else {
      books.unshift({ id: uid(), title, author: fAuthor.value.trim(), note: fNote.value.trim(), status: formStatus, stars: formStars, date: today });
    }
    save(); closeModal(); render();
  });

  fTitle.addEventListener("input", () => { fTitle.style.borderColor = ""; });

  render();
</script>
</body>
</html>
